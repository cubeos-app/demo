# =============================================================================
# CubeOS Demo Pipeline
# =============================================================================
# Builds the CubeOS dashboard with VITE_DEMO_MODE=true, packages as a Docker
# image, and deploys to DMZ via AWX.
#
# WORKFLOW:
#   1. Push to main → build dashboard with demo mode → package as Docker image
#   2. Push image to GHCR (ghcr.io/cubeos-app/demo:latest)
#   3. Trigger AWX job template to deploy on DMZ nodes
#
# TRIGGERS:
#   - Automatic on push to main
#   - Triggered by dashboard repo via pipeline trigger (token-based)
#   - Scheduled pipeline (optional, configure in GitLab CI/CD → Schedules)
#
# PREREQUISITES:
#   - Group CI vars: GHCR_USER, GHCR_TOKEN, AWX_HOST, AWX_TOKEN
#   - Project CI var: AWX_DEMO_TEMPLATE_ID=42
#   - Dashboard repo accessible via CI_JOB_TOKEN (same group)
# =============================================================================

stages:
  - build
  - package
  - deploy

variables:
  DEMO_BASE_IMAGE: "registry-gitlab.nuclearlighters.net/infrastructure/nllei01/production/cubeos-demo-nginx-base:latest"
  GHCR_IMAGE: "ghcr.io/cubeos-app/demo"
  DASHBOARD_REPO: "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.nuclearlighters.net/products/cubeos/dashboard.git"

# =============================================================================
# Build: Clone dashboard, build with VITE_DEMO_MODE=true
# =============================================================================
build:demo:
  stage: build
  tags: [docker]
  image: node:20-alpine
  script:
    - apk add --no-cache git
    - git clone --depth 1 ${DASHBOARD_REPO} dashboard-src
    - cd dashboard-src
    - npm ci --no-audit --no-fund
    - |
      # Create explicit demo env file — Vite loads .env.demo when --mode demo
      cat > .env.demo << 'EOF'
      NODE_ENV=production
      VITE_DEMO_MODE=true
      VITE_APP_VERSION=0.2.0-demo
      VITE_CUBEOS_DOMAIN=cubeos.cube
      EOF
      cat .env.demo
      npx vite build --mode demo
      echo "Build complete — $(find dist -type f | wc -l) files in dist/"
    - |
      # Validate demo mode was baked in:
      # When Vite processes import.meta.env.VITE_DEMO_MODE, it replaces the
      # literal string with "true". So if "VITE_DEMO_MODE" still appears
      # unreplaced in the JS output, the env var was NOT injected.
      # Also verify demo-client chunk exists (proves dynamic import resolved).
      if ls dist/assets/demo-client-*.js 1>/dev/null 2>&1; then
        echo "PASS: demo-client chunk found"
      else
        echo "FAIL: demo-client chunk missing — VITE_DEMO_MODE not baked in"
        echo "JS files in dist/assets/:"
        ls -la dist/assets/*.js
        echo "Checking for unreplaced VITE_DEMO_MODE references:"
        grep -l 'VITE_DEMO_MODE' dist/assets/*.js 2>/dev/null || echo "  (none found)"
        exit 1
      fi
      echo "Demo mode verified"
  artifacts:
    paths:
      - dashboard-src/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# Package: Build Docker image and push to GHCR
# =============================================================================
package:demo:
  stage: package
  tags: [docker]
  image: docker:24
  variables:
    DOCKER_API_VERSION: "1.41"
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - docker login registry-gitlab.nuclearlighters.net -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - docker pull ${DEMO_BASE_IMAGE} || true
    - printf 'ARG BASE_IMAGE\nFROM ${BASE_IMAGE}\nCOPY dashboard-src/dist/ /usr/share/nginx/html/\n' > Dockerfile.demo
    - docker build --no-cache --file Dockerfile.demo
        --build-arg BASE_IMAGE=${DEMO_BASE_IMAGE}
        -t ${GHCR_IMAGE}:latest
        -t ${GHCR_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker push ${GHCR_IMAGE}:latest
    - docker push ${GHCR_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - echo "Pushed ${GHCR_IMAGE}:latest and ${GHCR_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  needs: [build:demo]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# Deploy: Trigger AWX job template to deploy on DMZ
# =============================================================================
deploy:demo:
  stage: deploy
  tags: [docker]
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      echo "Triggering AWX job template ${AWX_DEMO_TEMPLATE_ID}..."
      RESPONSE=$(curl -s -X POST \
        -H "Authorization: Bearer ${AWX_TOKEN}" \
        -H "Content-Type: application/json" \
        "${AWX_HOST}/api/v2/job_templates/${AWX_DEMO_TEMPLATE_ID}/launch/")

      JOB_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
      if [ -z "$JOB_ID" ]; then
        echo "ERROR: Failed to launch AWX job"
        echo "$RESPONSE" | jq .
        exit 1
      fi
      echo "AWX Job launched: ${JOB_ID}"

      # Poll for completion (max 5 minutes)
      for i in $(seq 1 30); do
        sleep 10
        STATUS=$(curl -s -H "Authorization: Bearer ${AWX_TOKEN}" \
          "${AWX_HOST}/api/v2/jobs/${JOB_ID}/" | jq -r '.status')
        echo "  [$i/30] Status: $STATUS"
        case "$STATUS" in
          successful)
            echo "Deploy successful!"
            exit 0
            ;;
          failed|error|canceled)
            echo "Deploy failed with status: $STATUS"
            exit 1
            ;;
        esac
      done
      echo "ERROR: Timed out waiting for AWX job"
      exit 1
  needs: [package:demo]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: demo
    url: https://demo.cubeos.app
